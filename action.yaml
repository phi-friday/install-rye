name: install rye
description: instal rye using in github action
branding:
  icon: download
  color: white
author: phi

runs:
  using: composite
  steps:
    - name: prepare rye
      id: prepare-rye
      shell: bash
      run: |
        python3 $GITHUB_ACTION_PATH/src/action/prepare.py \
        ${{ inputs.rye_version }} \
        ${{ inputs.rye_home }} \
        ${{ inputs.python_version }} \
        ${{ inputs.use_uv }}

    - name: install rye
      id: install-rye
      shell: bash
      run: |
        python $GITHUB_ACTION_PATH/src/action/install.py \
        ${{ steps.prepare-rye.outputs.rye-version }} \
        ${{ steps.prepare-rye.outputs.rye-home }}


    - name: setup rye
      id: setup-rye
      shell: bash
      run: |
        python $GITHUB_ACTION_PATH/src/action/setup.py \
        ${{ steps.prepare-rye.outputs.python-version }} \
        ${{ steps.prepare-rye.outputs.use-uv }}

inputs:
  rye_version:
    description: rye version
    default: "default"
  rye_home:
    description: Where to install rye
    default: "default"
  python_version:
    description: The version of python that rye will use in the workspace
    default: "default"
  use_uv:
    description: if 'true', then use uv. else use pip-tools.
    default: "default"

outputs:
  rye-version:
    description: installed rye version
    value: ${{ steps.setup-rye.outputs.rye-version }}
  rye-home:
    description: installed rye path
    value: ${{ steps.setup-rye.outputs.rye-home }}
  python-version:
    description: pinned python version
    value: ${{ steps.setup-rye.outputs.python-version }}
  use-uv:
    description: use uv flag
    value: ${{ steps.setup-rye.outputs.use-uv }}